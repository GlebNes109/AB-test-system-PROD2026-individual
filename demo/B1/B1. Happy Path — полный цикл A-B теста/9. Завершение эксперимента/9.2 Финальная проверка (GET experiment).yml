info:
  name: 9.2 Финальная проверка (GET experiment)
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXPERIMENT_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        var json = res.getBody();
        test('Статус = finished', function () {
            expect(json.status).to.eql('finished');
        });

        console.log('=== ЭКСПЕРИМЕНТ ЗАВЕРШЁН ===');
        console.log('ID: ' + json.id);
        console.log('Результат: ' + json.result);
        console.log('Описание: ' + json.result_description);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
