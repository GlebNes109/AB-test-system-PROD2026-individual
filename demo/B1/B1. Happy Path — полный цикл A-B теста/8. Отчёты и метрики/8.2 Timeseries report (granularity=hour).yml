info:
  name: 8.2 Timeseries report (granularity=hour)
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXPERIMENT_ID}}/reports/timeseries?granularity=minute"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  params:
    - name: granularity
      value: minute
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        var json = res.getBody();
        test('Есть метрики в таймсерии', function () {
            expect(json.metrics).to.be.an('array');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
