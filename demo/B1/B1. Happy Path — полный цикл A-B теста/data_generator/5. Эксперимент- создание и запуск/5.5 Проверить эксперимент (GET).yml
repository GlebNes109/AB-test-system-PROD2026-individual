info:
  name: 5.5 Проверить эксперимент (GET)
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXPERIMENT_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        var json = res.getBody();
        test('Статус = running', function () {
            expect(json.status).to.eql('running');
        });
        test('Есть 2 варианта', function () {
            expect(json.variants).to.have.lengthOf(2);
        });
        test('Есть метрики', function () {
            expect(json.metrics.length).to.be.above(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
