info:
  name: 5.3 Approve (REVIEW → APPROVED)
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXPERIMENT_ID}}/review"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{TOKEN}}
  body:
    type: json
    data: |-
      {
        "decision": "ACCEPT",
        "comment": "Happy path demo — approved"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
