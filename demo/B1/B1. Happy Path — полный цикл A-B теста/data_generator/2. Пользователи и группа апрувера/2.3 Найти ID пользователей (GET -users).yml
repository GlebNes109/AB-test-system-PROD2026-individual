info:
  name: 2.3 Найти ID пользователей (GET /users)
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/users?size=100"
  headers:
    - name: Authorization
      value: Bearer {{TOKEN}}
  params:
    - name: size
      value: "100"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        var json = res.getBody();
        var users = json.items;

        var exp = users.find(function(u) { return u.email === 'b1_experimenter@demo.com'; });
        var apr = users.find(function(u) { return u.email === 'b1_approver@demo.com'; });

        if (exp) bru.setVar('EXPERIMENTER_ID', exp.id);
        if (apr) bru.setVar('APPROVER_ID', apr.id);

        test('Найден experimenter', function () { expect(exp).to.not.be.undefined; });
        test('Найден approver', function () { expect(apr).to.not.be.undefined; });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
