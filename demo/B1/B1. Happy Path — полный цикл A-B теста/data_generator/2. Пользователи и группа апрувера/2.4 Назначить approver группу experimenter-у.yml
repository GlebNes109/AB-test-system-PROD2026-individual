info:
  name: 2.4 Назначить approver группу experimenter-у
  type: http
  seq: 4

http:
  method: PUT
  url: "{{BASE_URL}}/api/v1/users/{{EXPERIMENTER_ID}}/approvers"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{TOKEN}}
  body:
    type: json
    data: |-
      {
        "approver_ids": ["{{APPROVER_ID}}"],
        "min_approvals": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
