info:
  name: 1.1 Login (admin)
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "admin@mail.ru",
        "password": "123123123aA!"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        var json = res.getBody();
        bru.setVar('TOKEN', json.accessToken);

        test('Получен accessToken', function () {
            expect(json.accessToken).to.be.a('string').and.not.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
