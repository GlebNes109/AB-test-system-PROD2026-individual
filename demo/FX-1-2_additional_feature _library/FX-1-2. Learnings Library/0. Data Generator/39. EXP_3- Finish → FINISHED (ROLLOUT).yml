info:
  name: "39. EXP_3: Finish → FINISHED (ROLLOUT)"
  type: http
  seq: 39

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_3_ID}}/finish"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "result": "ROLLOUT",
        "result_description": "CTR поиска вырос на 8% (p<0.05). ML-ранжирование лучше учитывает контекст."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 200', function() { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
