info:
  name: 8. Create event type ll_purchase (requires ll_click)
  type: http
  seq: 8

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/types"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "type": "ll_purchase",
        "description": "Покупка",
        "payload_schema": {"amount": "number", "currency": "string"},
        "prerequisite_event_type": "ll_click"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
