info:
  name: 19. Create flag ll_push_frequency
  type: http
  seq: 19

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/feature-flags"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "ll_push_frequency",
        "type": "string",
        "default_value": "daily",
        "description": "Частота push-уведомлений"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
