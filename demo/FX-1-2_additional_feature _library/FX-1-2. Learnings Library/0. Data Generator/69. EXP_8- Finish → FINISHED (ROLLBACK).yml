info:
  name: "69. EXP_8: Finish → FINISHED (ROLLBACK)"
  type: http
  seq: 69

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_8_ID}}/finish"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "result": "ROLLBACK",
        "result_description": "Средний чек упал на 8% — пользователи стали активнее искать промокоды. Негативный эффект."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 200', function() { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
