info:
  name: "53. EXP_6: Создать (DRAFT) — Push 2 раза в неделю"
  type: http
  seq: 53

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "name": "Push-уведомления: ежедневные vs 2 раза в неделю",
        "feature_flag_key": "ll_push_frequency",
        "audience_percentage": 100,
        "variants": [
          {"name": "control",   "value": "daily",        "weight": 50, "is_control": true},
          {"name": "treatment", "value": "twice_weekly", "weight": 50, "is_control": false}
        ],
        "metrics": [{"metric_key": "ll_views", "type": "PRIMARY"}]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 201', function() { expect(res.getStatus()).to.equal(201); });
        bru.setVar('EXP_6_ID', res.getBody().id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
