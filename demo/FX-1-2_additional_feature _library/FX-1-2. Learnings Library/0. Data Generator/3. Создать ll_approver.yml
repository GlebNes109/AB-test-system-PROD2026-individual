info:
  name: 3. Создать ll_approver
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/users"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "email": "ll_approver@demo.com",
        "password": "Demo1234!x",
        "role": "APPROVER"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
