info:
  name: 6. Create event type ll_page_view
  type: http
  seq: 6

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/types"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "type": "ll_page_view",
        "description": "Просмотр страницы"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
