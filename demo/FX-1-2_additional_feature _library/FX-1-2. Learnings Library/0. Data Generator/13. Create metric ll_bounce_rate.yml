info:
  name: 13. Create metric ll_bounce_rate
  type: http
  seq: 13

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/metrics"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "ll_bounce_rate",
        "name": "Bounce rate",
        "description": "COUNT ll_page_view / COUNT ll_click",
        "event_type": "ll_page_view",
        "aggregation": "COUNT",
        "denominator_event_type": "ll_click",
        "denominator_aggregation": "COUNT"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
