info:
  name: "47. EXP_5: Создать (DRAFT) — Онбординг интерактивный"
  type: http
  seq: 47

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "name": "Онбординг: интерактивный тур vs статичные подсказки",
        "feature_flag_key": "ll_onboarding",
        "audience_percentage": 100,
        "variants": [
          {"name": "control",   "value": "standard",    "weight": 50, "is_control": true},
          {"name": "treatment", "value": "interactive", "weight": 50, "is_control": false}
        ],
        "metrics": [{"metric_key": "ll_views", "type": "PRIMARY"}]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 201', function() { expect(res.getStatus()).to.equal(201); });
        bru.setVar('EXP_5_ID', res.getBody().id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
