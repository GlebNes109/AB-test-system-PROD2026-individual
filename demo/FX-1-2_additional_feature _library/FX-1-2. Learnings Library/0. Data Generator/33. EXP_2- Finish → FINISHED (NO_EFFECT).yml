info:
  name: "33. EXP_2: Finish → FINISHED (NO_EFFECT)"
  type: http
  seq: 33

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_2_ID}}/finish"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "result": "NO_EFFECT",
        "result_description": "Статистически значимой разницы не обнаружено (p=0.42). Автозаполнение не повлияло на конверсию."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 200', function() { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
