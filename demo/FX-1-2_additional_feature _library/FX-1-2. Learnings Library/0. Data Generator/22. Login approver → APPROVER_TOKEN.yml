info:
  name: 22. Login approver → APPROVER_TOKEN
  type: http
  seq: 22

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "ll_approver@demo.com",
        "password": "Demo1234!x"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        bru.setVar('APPROVER_TOKEN', res.getBody().accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
