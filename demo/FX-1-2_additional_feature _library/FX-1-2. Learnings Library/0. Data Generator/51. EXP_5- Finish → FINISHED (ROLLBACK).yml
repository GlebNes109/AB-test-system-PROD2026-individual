info:
  name: "51. EXP_5: Finish → FINISHED (ROLLBACK)"
  type: http
  seq: 51

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_5_ID}}/finish"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "result": "ROLLBACK",
        "result_description": "Retention D7 упал на 5% (p<0.05). Интерактивный тур раздражал пользователей."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 200', function() { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
