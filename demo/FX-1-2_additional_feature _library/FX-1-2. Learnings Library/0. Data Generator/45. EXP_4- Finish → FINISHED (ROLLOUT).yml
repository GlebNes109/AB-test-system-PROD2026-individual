info:
  name: "45. EXP_4: Finish → FINISHED (ROLLOUT)"
  type: http
  seq: 45

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_4_ID}}/finish"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "result": "ROLLOUT",
        "result_description": "Конверсия поиска +15% (p<0.001). Пользователи быстрее находят нужный товар."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 200', function() { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
