info:
  name: "FX-2a: поиск q=конверсия"
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?q=конверсия"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: q
      value: конверсия
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('Найдены результаты (релевантные learnings)', function() { expect(json.total).to.be.above(0); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
