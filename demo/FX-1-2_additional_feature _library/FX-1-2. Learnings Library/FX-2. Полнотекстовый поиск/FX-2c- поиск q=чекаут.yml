info:
  name: "FX-2c: поиск q=чекаут"
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?q=чекаут"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: q
      value: чекаут
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('Найдены learnings связанные с чекаутом (EXP_1, EXP_2, EXP_8)', function() { expect(json.total).to.be.above(0); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
