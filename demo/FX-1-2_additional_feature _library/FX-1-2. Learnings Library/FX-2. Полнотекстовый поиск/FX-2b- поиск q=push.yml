info:
  name: "FX-2b: поиск q=push"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?q=push"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: q
      value: push
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('Найден learning EXP_6 (push-уведомления)', function() { expect(json.total).to.be.above(0); });
        test('В результатах есть learning с push в notes/hypothesis', function() {
            var hasPush = json.items.some(function(i) {
                return (i.notes || '').toLowerCase().includes('push') || (i.hypothesis || '').toLowerCase().includes('push');
            });
            expect(hasPush).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
