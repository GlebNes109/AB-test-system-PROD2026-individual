info:
  name: "FX-4: GET /learnings/{{LEARNING_1_ID}}"
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings/{{LEARNING_1_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('id совпадает', function() { expect(json.id).to.eql(bru.getVar('LEARNING_1_ID')); });
        test('experiment_name присутствует', function() { expect(json.experiment_name).to.be.a('string').and.not.empty; });
        test('feature_flag_key = ll_checkout_flow', function() { expect(json.feature_flag_key).to.eql('ll_checkout_flow'); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
