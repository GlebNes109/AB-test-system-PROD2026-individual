info:
  name: "FX-7.1: GET /learnings?result=INVALID → 400"
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?result=INVALID"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: result
      value: INVALID
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 400 — невалидное значение result', function() { expect(res.getStatus()).to.equal(400); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
