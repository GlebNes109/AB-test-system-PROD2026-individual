info:
  name: "FX-3.6: комбо q=поиск&result=ROLLOUT&tags=search"
  type: http
  seq: 8

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?q=поиск&result=ROLLOUT&tags=search"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: q
      value: поиск
      type: query
    - name: result
      value: ROLLOUT
      type: query
    - name: tags
      value: search
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('2 learning — EXP_3 и EXP_4 (поиск + ROLLOUT + тег search)', function() { expect(json.total).to.eql(2); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
