info:
  name: "FX-3.3a: по тегу tags=checkout"
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?tags=checkout"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: tags
      value: checkout
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('3 learnings с тегом checkout (EXP_1, EXP_2, EXP_8)', function() { expect(json.total).to.eql(3); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
