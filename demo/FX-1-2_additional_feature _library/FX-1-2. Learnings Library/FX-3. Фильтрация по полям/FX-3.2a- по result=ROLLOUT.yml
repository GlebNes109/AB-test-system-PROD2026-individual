info:
  name: "FX-3.2a: по result=ROLLOUT"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?result=ROLLOUT"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: result
      value: ROLLOUT
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('5 learnings с результатом ROLLOUT (EXP_1,3,4,6,7)', function() { expect(json.total).to.eql(5); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
