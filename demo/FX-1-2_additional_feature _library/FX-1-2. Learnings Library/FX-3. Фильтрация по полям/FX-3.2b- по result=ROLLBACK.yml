info:
  name: "FX-3.2b: по result=ROLLBACK"
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?result=ROLLBACK"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: result
      value: ROLLBACK
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('2 learnings с результатом ROLLBACK (EXP_5 онбординг, EXP_8 промокод)', function() { expect(json.total).to.eql(2); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
