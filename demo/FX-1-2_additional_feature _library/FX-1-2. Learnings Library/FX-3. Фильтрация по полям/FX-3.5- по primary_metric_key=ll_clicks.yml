info:
  name: "FX-3.5: по primary_metric_key=ll_clicks"
  type: http
  seq: 7

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings?primary_metric_key=ll_clicks"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  params:
    - name: primary_metric_key
      value: ll_clicks
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('3 learnings с метрикой ll_clicks (EXP_3, EXP_4, EXP_7)', function() { expect(json.total).to.eql(3); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
