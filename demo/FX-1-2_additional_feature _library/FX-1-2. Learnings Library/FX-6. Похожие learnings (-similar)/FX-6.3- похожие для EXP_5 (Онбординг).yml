info:
  name: "FX-6.3: похожие для EXP_5 (Онбординг)"
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings/similar/{{EXP_5_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('Есть похожие learnings', function() { expect(json).to.be.an('array').with.length.above(0); });
        test('EXP_6 в результатах (same_primary_metric ll_views + common_tags: retention)', function() {
            var hasMetric = json.some(function(r) {
                return r.similarity_reason && r.similarity_reason.includes('same_primary_metric');
            });
            expect(hasMetric).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
