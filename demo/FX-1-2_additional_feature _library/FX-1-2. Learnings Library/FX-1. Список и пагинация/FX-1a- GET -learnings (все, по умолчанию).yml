info:
  name: "FX-1a: GET /learnings (все, по умолчанию)"
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/learnings"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('total = 8', function() { expect(json.total).to.eql(8); });
        test('items содержит 8 записей', function() { expect(json.items).to.have.lengthOf(8); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
