info:
  name: 0.18 Start → RUNNING
  type: http
  seq: 18

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_ID}}/start"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: text
    data: ""
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        test('status = running', function () { expect(res.getBody().status).to.eql('running'); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
