info:
  name: "0.07 Create event type: b4_impression (no payload)"
  type: http
  seq: 7

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/types"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "type": "b4_impression",
        "description": "Показ элемента (экспозиция)"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
