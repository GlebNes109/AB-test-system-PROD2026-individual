info:
  name: 0.05 Set approver group
  type: http
  seq: 5

http:
  method: PUT
  url: "{{BASE_URL}}/api/v1/users/{{EXPERIMENTER_ID}}/approvers"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "approver_ids": ["{{APPROVER_ID}}"],
        "min_approvals": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('200', function () { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
