info:
  name: "0.12 Create flag: b4_checkout_flow"
  type: http
  seq: 12

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/feature-flags"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "b4_checkout_flow",
        "type": "string",
        "default_value": "legacy_checkout",
        "description": "B4: флаг для эксперимента с чекаутом"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
