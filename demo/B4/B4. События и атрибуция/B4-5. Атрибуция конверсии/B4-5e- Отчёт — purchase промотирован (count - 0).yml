info:
  name: "B4-5e: Отчёт — purchase промотирован (count > 0)"
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_ID}}/reports"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        console.log('=== REPORT after click (purchase should be promoted) ===');
        json.variants.forEach(function(v) {
            console.log('--- ' + v.variant_name + ' ---');
            v.metrics.forEach(function(m) {
                if (['b4_click_count','b4_purchase_count'].indexOf(m.metric_key) >= 0) {
                    console.log('  ' + m.metric_key + ' = ' + m.value);
                }
            });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
