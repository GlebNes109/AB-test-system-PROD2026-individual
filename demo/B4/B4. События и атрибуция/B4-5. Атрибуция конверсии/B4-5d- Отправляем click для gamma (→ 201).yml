info:
  name: "B4-5d: Отправляем click для gamma (→ 201)"
  type: http
  seq: 4

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/batch"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "events": [
          {
            "event_type": "b4_click",
            "decision_id": "{{DECISION_GAMMA}}",
            "payload": {"button_id": "checkout-btn"}
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 207', function () { expect(res.getStatus()).to.equal(207); });
        var r = res.getBody().results[0];
        test('status_code = 201', function () { expect(r.status_code).to.eql(201); });
        test('event_status = RECEIVED', function () { expect(r.event_status).to.eql('RECEIVED'); });
        console.log('B4-5d: Click для gamma принят — purchase должен промотироваться');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
