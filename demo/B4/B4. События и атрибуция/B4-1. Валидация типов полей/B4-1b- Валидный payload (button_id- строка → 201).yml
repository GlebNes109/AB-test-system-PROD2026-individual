info:
  name: "B4-1b: Валидный payload (button_id: строка → 201)"
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/batch"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "events": [
          {
            "event_type": "b4_click",
            "decision_id": "{{DECISION_ID}}",
            "payload": {"button_id": "buy-button-01"}
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 207', function () { expect(res.getStatus()).to.equal(207); });
        var r = res.getBody().results[0];
        test('status_code = 201 — принято', function () {
            expect(r.status_code).to.eql(201);
        });
        test('event_status = RECEIVED', function () {
            expect(r.event_status).to.eql('RECEIVED');
        });
        console.log('B4-1b: Валидный click принят, event_id=' + r.event_id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
