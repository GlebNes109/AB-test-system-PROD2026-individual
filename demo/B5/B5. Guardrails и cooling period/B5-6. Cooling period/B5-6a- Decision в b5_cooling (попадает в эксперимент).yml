info:
  name: "B5-6a: Decision в b5_cooling (попадает в эксперимент)"
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/decision"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": "b5-user-cooling-test",
        "subject_attr": {},
        "flags_keys": ["b5_cooling"]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('id != null — попал в эксперимент', function () {
            expect(json[0].id).to.not.be.null;
        });
        console.log('B5-6a: b5_cooling value=' + json[0].value + ' id=' + json[0].id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
