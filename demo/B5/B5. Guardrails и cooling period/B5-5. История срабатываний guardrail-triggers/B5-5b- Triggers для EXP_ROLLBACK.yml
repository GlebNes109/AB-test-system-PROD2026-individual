info:
  name: "B5-5b: Triggers для EXP_ROLLBACK"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_ROLLBACK_ID}}/guardrail-triggers"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('Есть хотя бы 1 trigger', function () { expect(json.length).to.be.above(0); });
        var t = json[0];
        test('threshold = 500', function () { expect(t.threshold).to.eql(500); });
        test('actual_value > threshold', function () { expect(t.actual_value).to.be.above(500); });
        test('action_taken = ROLLBACK', function () { expect(t.action_taken).to.eql('ROLLBACK'); });
        console.log('B5-5b: ROLLBACK trigger — actual=' + t.actual_value + ' > threshold=' + t.threshold);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
