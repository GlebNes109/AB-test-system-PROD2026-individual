info:
  name: "B5-3b: Event: page_view"
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/batch"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "events": [{
          "event_type": "b5_page_view",
          "decision_id": "{{DECISION_PAUSE}}"
        }]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('207', function () { expect(res.getStatus()).to.equal(207); });
        test('201', function () { expect(res.getBody().results[0].status_code).to.eql(201); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
