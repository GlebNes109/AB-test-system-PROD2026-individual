info:
  name: "B5-3a: Decision для b5-user-pause-01"
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/decision"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": "b5-user-pause-01",
        "subject_attr": {},
        "flags_keys": ["b5_guardrail_pause"]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        bru.setVar('DECISION_PAUSE', json[0].id);
        console.log('B5-3: DECISION_PAUSE=' + json[0].id + ' value=' + json[0].value);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
