info:
  name: "B5-4c: Проверка — status=finished, result=ROLLBACK"
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_ROLLBACK_ID}}"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        test('status = finished', function () { expect(json.status).to.eql('finished'); });
        test('result = ROLLBACK', function () { expect(json.result).to.eql('ROLLBACK'); });
        test('result_description не пустой', function () { expect(json.result_description).to.be.a('string').and.not.empty; });
        console.log('B5-4: status=' + json.status + ' result=' + json.result);
        console.log('B5-4: ' + json.result_description);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
