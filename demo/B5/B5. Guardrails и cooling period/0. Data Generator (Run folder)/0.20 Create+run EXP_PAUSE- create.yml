info:
  name: "0.20 Create+run EXP_PAUSE: create"
  type: http
  seq: 20

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "name": "B5: guardrail PAUSE (error_rate > 0.5)",
        "feature_flag_key": "b5_guardrail_pause",
        "audience_percentage": 100,
        "variants": [
          { "name": "control", "value": "old_page", "weight": 50, "is_control": true },
          { "name": "treatment", "value": "new_page", "weight": 50, "is_control": false }
        ],
        "metrics": [
          { "metric_key": "b5_page_view_count", "type": "PRIMARY" },
          { "metric_key": "b5_error_rate", "type": "GUARDRAIL", "threshold": 0.5, "window_minutes": 60, "action": "PAUSE" }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('201', function () { expect(res.getStatus()).to.equal(201); });
        bru.setVar('EXP_PAUSE_ID', res.getBody().id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
