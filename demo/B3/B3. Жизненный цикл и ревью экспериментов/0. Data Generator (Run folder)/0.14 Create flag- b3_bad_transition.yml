info:
  name: "0.14 Create flag: b3_bad_transition"
  type: http
  seq: 14

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/feature-flags"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "b3_bad_transition",
        "type": "string",
        "default_value": "bad_transition_default",
        "description": "B3-4: запрещённые переходы"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
