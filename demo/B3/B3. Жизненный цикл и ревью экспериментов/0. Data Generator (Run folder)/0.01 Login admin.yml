info:
  name: 0.01 Login admin
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "admin@mail.ru",
        "password": "123123123aA!"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        bru.setVar('ADMIN_TOKEN', json.accessToken);
        console.log('[gen] Admin logged in');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
