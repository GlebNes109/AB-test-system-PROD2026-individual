info:
  name: 0.08 Set approver group (min_approvals=2)
  type: http
  seq: 8

http:
  method: PUT
  url: "{{BASE_URL}}/api/v1/users/{{EXPERIMENTER_ID}}/approvers"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "approver_ids": ["{{APPROVER_ALPHA_ID}}", "{{APPROVER_BETA_ID}}"],
        "min_approvals": 2
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () { expect(res.getStatus()).to.equal(200); });
        console.log('[gen] Approver group set: alpha + beta, min_approvals=2');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
