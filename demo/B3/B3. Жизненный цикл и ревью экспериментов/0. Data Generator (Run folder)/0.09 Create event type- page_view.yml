info:
  name: "0.09 Create event type: page_view"
  type: http
  seq: 9

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/types"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "type": "b3_page_view",
        "description": "Просмотр страницы"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
