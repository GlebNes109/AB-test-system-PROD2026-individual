info:
  name: 0.28 Submit b3_role_policy → REVIEW
  type: http
  seq: 28

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_ROLE_POLICY}}/submit"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: text
    data: ""
  auth: inherit

runtime:
