info:
  name: 0.07 GET users → find IDs
  type: http
  seq: 7

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/users?size=100"
  headers:
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  params:
    - name: size
      value: "100"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () { expect(res.getStatus()).to.equal(200); });
        var users = res.getBody().items;
        function findId(email) { var u = users.find(function(x){return x.email===email;}); return u ? u.id : null; }

        var expId = findId('b3_experimenter@demo.com');
        var alphaId = findId('b3_approver_alpha@demo.com');
        var betaId = findId('b3_approver_beta@demo.com');

        if (expId) bru.setVar('EXPERIMENTER_ID', expId);
        if (alphaId) bru.setVar('APPROVER_ALPHA_ID', alphaId);
        if (betaId) bru.setVar('APPROVER_BETA_ID', betaId);

        test('Found experimenter', function () { expect(expId).to.not.be.null; });
        test('Found approver_alpha', function () { expect(alphaId).to.not.be.null; });
        test('Found approver_beta', function () { expect(betaId).to.not.be.null; });

        console.log('[gen] EXPERIMENTER_ID=' + expId);
        console.log('[gen] APPROVER_ALPHA_ID=' + alphaId);
        console.log('[gen] APPROVER_BETA_ID=' + betaId);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
