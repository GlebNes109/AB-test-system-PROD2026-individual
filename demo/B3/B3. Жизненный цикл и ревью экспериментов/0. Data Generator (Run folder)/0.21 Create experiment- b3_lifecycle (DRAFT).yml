info:
  name: "0.21 Create experiment: b3_lifecycle (DRAFT)"
  type: http
  seq: 21

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  body:
    type: json
    data: |-
      {
        "name": "B3-1: жизненный цикл DRAFT→REVIEW",
        "feature_flag_key": "b3_lifecycle",
        "audience_percentage": 100,
        "variants": [
          { "name": "control", "value": "lifecycle_ctrl", "weight": 50, "is_control": true },
          { "name": "treatment", "value": "lifecycle_treat", "weight": 50, "is_control": false }
        ],
        "metrics": [{ "metric_key": "b3_page_view_count", "type": "PRIMARY" }]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 201', function () { expect(res.getStatus()).to.equal(201); });
        var json = res.getBody();
        bru.setVar('EXP_LIFECYCLE', json.id);
        test('status = draft', function () { expect(json.status).to.eql('draft'); });
        console.log('[gen] EXP_LIFECYCLE=' + json.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
