      value: application/json
    - name: Authorization
      value: Bearer {{APPROVER_ALPHA_TOKEN}}
  body:
    type: json
    data: |-
      {
        "decision": "ACCEPT",
        "comment": "Одобрено назначенным аппрувером Alpha"
      }
  auth: inherit

runtime:
