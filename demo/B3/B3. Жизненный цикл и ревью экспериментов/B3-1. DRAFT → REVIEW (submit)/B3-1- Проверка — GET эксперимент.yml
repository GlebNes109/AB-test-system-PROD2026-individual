info:
  name: "B3-1: Проверка — GET эксперимент"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_LIFECYCLE}}"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () { expect(res.getStatus()).to.equal(200); });
        test('status = review', function () { expect(res.getBody().status).to.eql('review'); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
