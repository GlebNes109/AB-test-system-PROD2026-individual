info:
  name: "B3-2a: Первое одобрение (approver_alpha)"
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_APPROVAL}}/review"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{APPROVER_ALPHA_TOKEN}}
  body:
    type: json
    data: |-
      {
        "decision": "ACCEPT",
        "comment": "Одобряю — Alpha"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () { expect(res.getStatus()).to.equal(200); });
        console.log('B3-2: Первое одобрение от Alpha принято');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
