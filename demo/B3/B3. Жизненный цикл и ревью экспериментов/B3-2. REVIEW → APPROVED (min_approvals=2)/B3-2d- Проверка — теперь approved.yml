info:
  name: "B3-2d: Проверка — теперь approved"
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_APPROVAL}}"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () { expect(res.getStatus()).to.equal(200); });
        test('status = approved (оба одобрения получены)', function () {
            expect(res.getBody().status).to.eql('approved');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
