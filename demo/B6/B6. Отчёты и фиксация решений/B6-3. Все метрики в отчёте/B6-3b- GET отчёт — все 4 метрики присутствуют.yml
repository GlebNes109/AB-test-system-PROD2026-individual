info:
  name: "B6-3b: GET отчёт — все 4 метрики присутствуют"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_REPORTS_ID}}/reports"
  headers:
    - name: Authorization
      value: Bearer {{EXPERIMENTER_TOKEN}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200', function () { expect(res.getStatus()).to.equal(200); });
        var json = res.getBody();
        var variant = json.variants[0];
        var reportKeys = variant.metrics.map(function(m){return m.metric_key;});

        test('b6_views_count в отчёте', function () { expect(reportKeys).to.include('b6_views_count'); });
        test('b6_clicks_count в отчёте', function () { expect(reportKeys).to.include('b6_clicks_count'); });
        test('b6_conversion в отчёте', function () { expect(reportKeys).to.include('b6_conversion'); });
        test('b6_avg_revenue в отчёте', function () { expect(reportKeys).to.include('b6_avg_revenue'); });

        console.log('B6-3b: метрики в отчёте (' + variant.variant_name + '):');
        variant.metrics.forEach(function(m) { console.log('  ' + m.metric_key + ' = ' + m.value); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
