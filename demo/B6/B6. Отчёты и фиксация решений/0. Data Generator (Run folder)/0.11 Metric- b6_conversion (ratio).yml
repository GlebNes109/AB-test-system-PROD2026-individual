info:
  name: "0.11 Metric: b6_conversion (ratio)"
  type: http
  seq: 11

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/metrics"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "b6_conversion",
        "name": "Конверсия (покупки / клики)",
        "description": "COUNT b6_purchase / COUNT b6_click",
        "event_type": "b6_purchase",
        "aggregation": "COUNT",
        "denominator_event_type": "b6_click",
        "denominator_aggregation": "COUNT"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
