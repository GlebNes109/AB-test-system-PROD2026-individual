info:
  name: "0.13 Flag: b6_reports"
  type: http
  seq: 13

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/feature-flags"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "b6_reports",
        "type": "string",
        "default_value": "old_design",
        "description": "B6: эксперимент для проверки отчётов"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
