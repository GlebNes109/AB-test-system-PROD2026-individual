info:
  name: "0.08 Event type: b6_purchase (requires b6_click)"
  type: http
  seq: 8

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/events/types"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "type": "b6_purchase",
        "description": "Покупка",
        "requires_event_type": "b6_click",
        "payload_schema": {"amount": "number"}
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
