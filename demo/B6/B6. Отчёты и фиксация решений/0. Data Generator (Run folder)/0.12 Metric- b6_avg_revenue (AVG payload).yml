info:
  name: "0.12 Metric: b6_avg_revenue (AVG payload)"
  type: http
  seq: 12

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/metrics"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "b6_avg_revenue",
        "name": "Средний чек (amount)",
        "description": "AVG b6_purchase.amount",
        "event_type": "b6_purchase",
        "aggregation": "AVG",
        "payload_field": "amount"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('201 or 409', function () { expect([201,409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
