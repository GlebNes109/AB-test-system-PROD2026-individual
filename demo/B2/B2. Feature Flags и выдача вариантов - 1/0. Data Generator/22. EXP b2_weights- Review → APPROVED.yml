info:
  name: "22. EXP b2_weights: Review → APPROVED"
  type: http
  seq: 22

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/experiments/{{EXP_WEIGHTS_ID}}/review"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "decision": "ACCEPT",
        "comment": "Seed B2."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Status 200', function() { expect(res.getStatus()).to.equal(200); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
