info:
  name: 4. GET users → save IDs
  type: http
  seq: 4

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/users?size=100"
  headers:
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  params:
    - name: size
      value: "100"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function() { expect(res.getStatus()).to.equal(200); });
        var users = res.getBody().items || [];
        var exp = users.find(function(u) { return u.email === 'b2_experimenter@demo.com'; });
        var app = users.find(function(u) { return u.email === 'b2_approver@demo.com'; });
        if (exp) { bru.setVar('EXPERIMENTER_ID', exp.id); console.log('EXPERIMENTER_ID:', exp.id); }
        if (app) { bru.setVar('APPROVER_ID', app.id); console.log('APPROVER_ID:', app.id); }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
