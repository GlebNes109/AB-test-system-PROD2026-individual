info:
  name: 7. Create metric (exposure_count)
  type: http
  seq: 7

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/metrics"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "exposure_count",
        "name": "Число показов",
        "description": "COUNT exposure",
        "event_type": "exposure",
        "aggregation": "COUNT"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
