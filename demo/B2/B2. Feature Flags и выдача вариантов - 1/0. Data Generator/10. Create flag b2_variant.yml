info:
  name: 10. Create flag b2_variant
  type: http
  seq: 10

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/feature-flags"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{ADMIN_TOKEN}}
  body:
    type: json
    data: |-
      {
        "key": "b2_variant",
        "type": "string",
        "default_value": "old_design_defaultvalue",
        "description": "B2-3/B2-4: флаг с экспериментом без таргетинга"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('Создан или существует', function() { expect([201, 409]).to.include(res.getStatus()); });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
