info:
  name: "B2-2a: таргетинг пройден (country=RU)"
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/decision"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": "user-ru-001",
        "subject_attr": {"country": "RU"},
        "flags_keys": ["b2_targeting"]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('id != null — пользователь попал в эксперимент', function () {
            var json = res.getBody();
            expect(json).to.be.an('array').with.lengthOf(1);
            expect(json[0].id).to.not.be.null;
        });

        test('value — один из вариантов эксперимента (не default)', function () {
            var json = res.getBody();
            var allowed = ['default_color_variant', 'red_variant'];
            expect(allowed).to.include(json[0].value);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
