info:
  name: "B2-1: decision (b2_no_experiment)"
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/decision"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": "user-001",
        "subject_attr": {},
        "flags_keys": ["b2_no_experiment"]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('value = fallback_value (default флага)', function () {
            var json = res.getBody();
            expect(json).to.be.an('array').with.lengthOf(1);
            expect(json[0].value).to.eql('fallback_value');
        });

        test('id = null (решение по эксперименту не создавалось)', function () {
            var json = res.getBody();
            expect(json[0].id).to.be.null;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
