stages:
  - lint
  - format

lint:
  stage: lint
  image: python:3.12
  before_script:
    - pip install ruff
  script:
    - ruff check ab_test_platform/
  only:
    - merge_requests
    - branches

format:
  stage: format
  image: python:3.12
  before_script:
    - pip install black
  script:
    - black --check ab_test_platform/
  only:
    - merge_requests
    - branches
