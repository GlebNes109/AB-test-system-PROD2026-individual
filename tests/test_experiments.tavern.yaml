---
test_name: Experiment create
stages:
  - name: Login as admin
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "{ADMIN_EMAIL}"
        password: "{ADMIN_PASSWORD}"
    response:
      status_code: 200
      save:
        json:
          admin_token: accessToken

  - name: Create experimenter
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        email: "exp_create_user@example.com"
        password: "NewUser123!"
        role: "EXPERIMENTER"
    response:
      status_code: 201
      save:
        json:
          experimenter_id: id

  - name: Login as experimenter
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "exp_create_user@example.com"
        password: "NewUser123!"
    response:
      status_code: 200
      save:
        json:
          experimenter_token: accessToken

  - name: Create event click
    request:
      url: "{test_server_url}/api/v1/events/types"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        {
          "type": "click",
          "description": "клик"
        }
    response:
      status_code: 201

  - name: Create error event
    request:
      url: "{test_server_url}/api/v1/events/types"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        {
          "type": "error",
          "description": "ошибка"
        }
    response:
      status_code: 201

  - name: Create purchase event
    request:
      url: "{test_server_url}/api/v1/events/types"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        {
          "type": "purchase",
          "description": "purchase"
        }
    response:
      status_code: 201

  - name: Create flag
    request:
      url: "{test_server_url}/api/v1/feature-flags"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "testflag"
        type: "string"
        default_value: "true"
    response:
      status_code: 201
      save:
        json:
          flag_id: id
          flag_key: key

  - name: Create metric in catalog
    request:
      url: "{test_server_url}/api/v1/metrics"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "exp_create_metric"
        name: "Conversion"
        event_type: "click"
        aggregation: "COUNT_UNIQUE"
    response:
      status_code: 201

  - name: Create experiment
    request:
      url: "{test_server_url}/api/v1/experiments"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
      json:
        feature_flag_key: "{flag_key}"
        name: "test experiment"
        audience_percentage: 12
        variants:
          - name: "control"
            value: "string1"
            weight: 11
            is_control: true
          - name: "variant_a"
            value: "string2"
            weight: 1
            is_control: false
        metrics:
          - metric_key: "exp_create_metric"
            type: "PRIMARY"
    response:
      status_code: 201
      strict: false
      json:
        feature_flag_key: "testflag"
        name: "test experiment"
        status: "draft"
        audience_percentage: 12
        version: 1
      verify_response_with:
        function: tests.helpers:verify_experiment_response
      save:
        json:
          experiment_id: id

