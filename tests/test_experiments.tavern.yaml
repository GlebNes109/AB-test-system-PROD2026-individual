---
test_name: Create experiment with guardrail metric
stages:
  - name: Login as admin
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "{ADMIN_EMAIL}"
        password: "{ADMIN_PASSWORD}"
    response:
      status_code: 200
      save:
        json:
          admin_token: accessToken

  - name: Create experimenter
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        email: "exp_guardrail@example.com"
        password: "NewUser123!"
        role: "EXPERIMENTER"
    response:
      status_code: 201

  - name: Login as experimenter
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "exp_guardrail@example.com"
        password: "NewUser123!"
    response:
      status_code: 200
      save:
        json:
          experimenter_token: accessToken

  - name: Create flag
    request:
      url: "{test_server_url}/api/v1/feature-flags"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "guardrail_flag"
        type: "string"
        default_value: "v"
    response:
      status_code: 201
      save:
        json:
          flag_id: id
          flag_key: key

  - name: Create primary metric
    request:
      url: "{test_server_url}/api/v1/metrics"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "guardrail_primary"
        name: "Conversion"
        event_type: "purchase"
        aggregation: "COUNT_UNIQUE"
    response:
      status_code: 201

  - name: Create guardrail metric
    request:
      url: "{test_server_url}/api/v1/metrics"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "guardrail_errors"
        name: "Error rate"
        event_type: "error"
        aggregation: "COUNT"
    response:
      status_code: 201

  - name: Create experiment with primary and guardrail metrics
    request:
      url: "{test_server_url}/api/v1/experiments"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
      json:
        feature_flag_key: "{flag_key}"
        name: "guardrail experiment"
        audience_percentage: 50
        variants:
          - name: "ctrl"
            value: "a"
            weight: 25
            is_control: true
          - name: "test"
            value: "b"
            weight: 25
            is_control: false
        metrics:
          - metric_key: "guardrail_primary"
            type: "PRIMARY"
          - metric_key: "guardrail_errors"
            type: "GUARDRAIL"
            threshold: 0.05
            window_minutes: 10
            action: "PAUSE"
    response:
      status_code: 201
      verify_response_with:
        function: tests.helpers:verify_experiment_response
      save:
        json:
          experiment_id: id

  - name: Verify metrics in response
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}"
      method: GET
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      verify_response_with:
        function: tests.helpers:verify_experiment_response

