        Authorization: "Bearer {admin_token}"
      json:
        email: "lifecycle_approver@example.com"
        password: "Approver123!"
        role: "APPROVER"
    response:
      status_code: 201

  - name: Login as approver
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "lifecycle_approver@example.com"
        password: "Approver123!"
    response:
      status_code: 200
      save:
        json:
          approver_token: accessToken

  - name: Create flag for lifecycle test
    request:
      url: "{test_server_url}/api/v1/feature-flags"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "lifecycle_flag"
        type: "string"
        default_value: "base"
    response:
      status_code: 201
      save:
        json:
          flag_id: id
          flag_key: key

  - name: Create metric for lifecycle
    request:
      url: "{test_server_url}/api/v1/metrics"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        key: "lifecycle_metric"
        name: "Conversion"
        event_type: "click"
        aggregation: "COUNT_UNIQUE"
    response:
      status_code: 201

  - name: Create experiment
    request:
      url: "{test_server_url}/api/v1/experiments"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
      json:
        feature_flag_key: "{flag_key}"
        name: "lifecycle experiment"
        audience_percentage: 50
        variants:
          - name: "ctrl"
            value: "base"
            weight: 25
            is_control: true
          - name: "variant_a"
            value: "new"
            weight: 25
            is_control: false
        metrics:
          - metric_key: "lifecycle_metric"
            type: "PRIMARY"
    response:
      status_code: 201
      strict: false
      json:
        status: "draft"
      save:
        json:
          experiment_id: id

  - name: Submit for review (draft -> review)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/submit"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      json:
        status: "review"
      verify_response_with:
        function: tests.helpers:verify_experiment_response

  - name: Approve via review (review -> approved)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/review"
      method: POST
      headers:
        Authorization: "Bearer {approver_token}"
      json:
        decision: "ACCEPT"
        comment: "Looks good"
    response:
      status_code: 200

  - name: Verify experiment is approved
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}"
      method: GET
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      json:
        status: "approved"

  - name: Start experiment (approved -> running)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/start"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      json:
        status: "running"
      verify_response_with:
        function: tests.helpers:verify_experiment_response

  - name: Pause experiment (running -> paused)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/pause"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      json:
        status: "paused"
      verify_response_with:
        function: tests.helpers:verify_experiment_response

  - name: Resume experiment (paused -> running)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/resume"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      json:
        status: "running"
      verify_response_with:
        function: tests.helpers:verify_experiment_response

  - name: Finish experiment (running -> finished)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/finish"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
      json:
        result: "ROLLOUT"
        result_description: "Вариант показал лучшие результаты"
    response:
      status_code: 200
      strict: false
      json:
        status: "finished"
        result: "ROLLOUT"
        result_description: "Вариант показал лучшие результаты"
      verify_response_with:
        function: tests.helpers:verify_experiment_response

  - name: Archive experiment (finished -> archived)
    request:
      url: "{test_server_url}/api/v1/experiments/{experiment_id}/archive"
      method: POST
      headers:
        Authorization: "Bearer {experimenter_token}"
    response:
      status_code: 200
      strict: false
      json:
        status: "archived"
      verify_response_with:
        function: tests.helpers:verify_experiment_response

