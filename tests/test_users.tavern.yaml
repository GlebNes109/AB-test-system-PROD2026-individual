---
test_name: Admin creates user
stages:
  - name: Login as admin
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "{ADMIN_EMAIL}"
        password: "{ADMIN_PASSWORD}"
    response:
      status_code: 200
      save:
        json:
          admin_token: accessToken

  - name: Create a new user
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        email: "newuser@example.com"
        password: "NewUser123!"
        role: "VIEWER"
    response:
      status_code: 201
      verify_response_with:
        function: tests.helpers:verify_user_response
      save:
        json:
          created_user_id: id

---
test_name: Create user without auth
stages:
  - name: Try to create user without token
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      json:
        email: "noauth@example.com"
        password: "NoAuth1234!"
    response:
      status_code: 401

---
test_name: Create user as VIEWER - forbidden
stages:
  - name: Login as admin
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "{ADMIN_EMAIL}"
        password: "{ADMIN_PASSWORD}"
    response:
      status_code: 200
      save:
        json:
          admin_token: accessToken

  - name: Create a viewer user
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        email: "viewer@example.com"
        password: "Viewer1234!"
        role: "VIEWER"
    response:
      status_code: 201
      save:
        json:
          viewer_id: id

  - name: Login as viewer
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "viewer@example.com"
        password: "Viewer1234!"
    response:
      status_code: 200
      save:
        json:
          viewer_token: accessToken

  - name: Viewer tries to create user
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      headers:
        Authorization: "Bearer {viewer_token}"
      json:
        email: "another@example.com"
        password: "Another123!"
    response:
      status_code: 403

