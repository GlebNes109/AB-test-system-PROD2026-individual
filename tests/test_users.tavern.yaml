---
test_name: Get non-existent user
stages:
  - name: Get user with fake ID
    request:
      url: "{test_server_url}/api/v1/users/00000000-0000-0000-0000-000000000000"
      method: GET
    response:
      status_code: 404

---
test_name: Admin updates user
stages:
  - name: Login as admin
    request:
      url: "{test_server_url}/api/v1/auth/login"
      method: POST
      json:
        email: "{ADMIN_EMAIL}"
        password: "{ADMIN_PASSWORD}"
    response:
      status_code: 200
      save:
        json:
          admin_token: accessToken

  - name: Create a user to update
    request:
      url: "{test_server_url}/api/v1/users"
      method: POST
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        email: "updateme@example.com"
        password: "UpdateMe12!"
        role: "VIEWER"
    response:
      status_code: 201
      save:
        json:
          user_id: id

  - name: Update user email
    request:
      url: "{test_server_url}/api/v1/users/{user_id}"
      method: PATCH
      headers:
        Authorization: "Bearer {admin_token}"
      json:
        email: "updated@example.com"
        password: "UpdateMe12!"
        role: "VIEWER"
    response:
      status_code: 200
      strict: false
      json:
        email: "updated@example.com"
      verify_response_with:
        function: tests.helpers:verify_user_response

