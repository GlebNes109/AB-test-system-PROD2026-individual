upstream api {
    server api:8080;
}

upstream emulator {
    server emulator:8090;
}

upstream metabase {
    server metabase:3000;
}

server {
    listen 80;

    # ── API ──────────────────────────────────────────────────────
    # Все запросы по умолчанию → API (включая /api/v1/*, /health, /ready, /docs)
    location / {
        proxy_pass http://api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Emulator ─────────────────────────────────────────────────
    # /emulator/ → emulator:8090/ (trailing slash strips prefix)
    location /emulator/ {
        proxy_pass http://emulator/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Metabase ─────────────────────────────────────────────────
    # /metabase/ → metabase:3000/ (trailing slash strips prefix)
    location /metabase/ {
        proxy_pass http://metabase/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket (Metabase real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Metabase может загружать большие дашборды
        proxy_read_timeout 300;
        client_max_body_size 50m;
    }
}
