services:

  # ── INFRASTRUCTURE ─────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: abtest-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      emulator:
        condition: service_started
      metabase:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: abtest-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/metabase-seed.sh:/docker-entrypoint-initdb.d/02-metabase-seed.sh
      - ./docker/metabase_seed.sql:/docker-entrypoint-initdb.d/metabase_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: abtest-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── APPLICATION ────────────────────────────────────────────────────────────

  api:
    build: ./ab_test_platform
    container_name: abtest-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_FULLNAME: ${ADMIN_FULLNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RANDOM_SECRET: ${RANDOM_SECRET}
      DROP_DB_ON_STARTUP: ${DROP_DB_ON_STARTUP}
      MV_REFRESH_INTERVAL_SECONDS: ${MV_REFRESH_INTERVAL_SECONDS}
      SERVER_ADDRESS: "0.0.0.0:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  emulator:
    build: ./external_system_emulator
    container_name: abtest-emulator
    environment:
      AB_PLATFORM_URL: "http://api:8080"
      HOST: "0.0.0.0"
      PORT: "8090"
      ROOT_PATH: "/emulator"
    depends_on:
      api:
        condition: service_healthy

  # ── TOOLS ──────────────────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: abtest-pgadmin
    ports:
      - "5050:5050"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 5050
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: abtest-metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_SITE_URL: "http://localhost/metabase/"
    depends_on:
      postgres:
        condition: service_healthy

  # ── TEST ───────────────────────────────────────────────────────────────────

  test-postgres:
    image: postgres:15-alpine
    container_name: abtest-test-postgres
    profiles: [test]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  test-redis:
    image: redis:7-alpine
    container_name: abtest-test-redis
    profiles: [test]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api-test:
    build: ./ab_test_platform
    profiles: [test]
    environment:
      DB_HOST: test-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: test-redis
      REDIS_PORT: 6379
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_FULLNAME: ${ADMIN_FULLNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RANDOM_SECRET: ${RANDOM_SECRET}
      SERVER_ADDRESS: "0.0.0.0:8080"
    volumes:
      - coverage-data:/coverage
      - ./ab_test_platform/coverage_html:/html
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    command: ["sh", "/app/ab_test_platform/scripts/api_coverage.sh"]

  test-runner:
    build: ./ab_test_platform
    profiles: [test]
    environment:
      TEST_SERVER_URL: "http://api-test:8080"
    volumes:
      - coverage-data:/coverage
      - ./tests:/app/tests
    depends_on:
      api-test:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        pytest -o tavern-global-cfg=tests/config-docker.yml -v tests/
        EXIT=$?
        echo "done" > /coverage/pytest_done
        exit $EXIT

volumes:
  postgres_data:
  coverage-data:
